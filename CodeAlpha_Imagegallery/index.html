<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    

</head>
<body>
   <button id="theme" onclick="theme()" >
        <span class="light">☀︎</span>
        <span class="dark">☾</span>
    </button>
    

    <h1>Image Gallery</h1>
    <div class="filter-buttons">
        <button class="active" onclick="filterselection('all',this)">All</button>
        <button onclick="filterselection('nature',this)">Nature</button>
        <button onclick="filterselection('animal',this)">Animal</button>
        <button onclick="filterselection('anime',this)">Anime</button>
        <button onclick="filterselection('food',this)">Food</button>
        <button onclick="filterselection('clothes',this)">Clothes</button>
        <button onclick="filterselection('other',this)">Other</button>
    </div>
    <div class="gallery">
            <div class="image other">
                <img src="images/img1.jpg" onclick="openlightbox(this.src)" alt="Image 1">
            </div>
            <div class="image animal">
                <img src="images/img2.jpg" onclick="openlightbox(this.src)" alt="Image 2">
            </div>
            <div class="image nature">
                <img src="images/img3.jpg" onclick="openlightbox(this.src)" alt="Image 3">
            </div>
            <div class="image other">
                <img src="images/img4.jpg" onclick="openlightbox(this.src)" alt="Image 4">
            </div>
            <div class="image nature">
                <img src="images/img6.png" onclick="openlightbox(this.src)" alt="Image 5">
            </div>
            <div class="image anime">
                <img src="images/img7.jpg" onclick="openlightbox(this.src)" alt="Image 6">
            </div>
            <div class="image food">
                <img src="images/img8.jpg" onclick="openlightbox(this.src)" alt="Image 7">
            </div>
            <div class="image clothes">
                <img src="images/img9.jpg" onclick="openlightbox(this.src)" alt="Image 8">
            </div>
            <div class="image other">
                <img src="images/img10.jpg" onclick="openlightbox(this.src)" alt="Image 9">
            </div>
            <div class="image food">
                <img src="images/img11.jpg" onclick="openlightbox(this.src)" alt="Image 10">
            </div>
            <div class="image clothes">
                <img src="images/img12.jpg" onclick="openlightbox(this.src)" alt="Image 11">
            </div>
            <div class="image other">
                <img src="images/img13.jpg" onclick="openlightbox(this.src)" alt="Image 12">
            </div>
            <div class="image clothes">
                <img src="images/img14.jpg" onclick="openlightbox(this.src)" alt="Image 13">
            </div>
            <div class="image clothes">
                <img src="images/img15.jpg" onclick="openlightbox(this.src)" alt="Image 14">
            </div>
            <div class="image nature">
                <img src="images/img16.jpg" onclick="openlightbox(this.src)" alt="Image 15">
            </div>
            <div class="image animal">
                <img src="images/img17.jpg" onclick="openlightbox(this.src)" alt="Image 16">
            </div>
            <div class="image anime">
                <img src="images/img18.jpg" onclick="openlightbox(this.src)" alt="Image 17">
            </div>
            <div class="image anime">
                <img src="images/img19.jpg" onclick="openlightbox(this.src)" alt="Image 18">
            </div>
            <div class="image nature">
                <img src="images/img20.jpg" onclick="openlightbox(this.src)" alt="Image 19">
            </div>
            <div class="image animal">
                <img src="images/img21.jpg" onclick="openlightbox(this.src)" alt="Image 20">
            </div>
    </div>
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <span id="prevBtn" class="prev" onclick="changeimage(-1)">&#10094;</span>
        <img id="lightbox-img" src="" alt="Lightbox Image">
        <span id="nextBtn" class="next" onclick="changeimage(1)">&#10095;</span>
    </div>
    
    <div class="copyright">&copy; 2026 HemnatH</div>
    <script src="script.js"></script>
</body>
</html>
